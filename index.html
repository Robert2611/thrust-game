<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thrust: Neon Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- The Protected Play Area (No overap) -->
        <div id="play-area">
            <canvas id="game-canvas"></canvas>
            
            <!-- HUD (Inside Play Area) -->
            <div id="hud">
                <div class="hud-item" id="fuel-container">
                    <label>FUEL</label>
                    <div class="bar-bg"><div id="fuel-bar"></div></div>
                </div>

                <div class="hud-item" id="score-display">
                    00000
                </div>
                <div class="hud-item" id="cargo-status">
                    HOLD: <div id="cargo-box-hud" class="hud-cargo-box"></div>
                </div>
            </div>

            <!-- Tactical Radar (Minimap) -->
            <div id="radar-container">
                <canvas id="radar-canvas" width="150" height="120"></canvas>
            </div>

            <!-- Overlays (Inside Play Area) -->
            <div id="start-screen" class="overlay">
                <h1>THRUST: NEON</h1>
                <p>Navigate the cave. Retrieve the pod.</p>

                <button id="start-btn">START MISSION</button>
                <p style="font-size: 0.8rem; margin-top: 10px; color: rgba(255, 255, 255, 0.5);">[ ENTER to launch ]</p>
            </div>

            <div id="success-screen" class="overlay" style="display: none;">
                <h1 class="bounce">MISSION COMPLETE!</h1>
                <div class="stats-box" style="margin-bottom: 30px; font-size: 1.5rem; color: var(--neon-blue);">
                    <p>FUEL REMAINING: <span id="final-fuel">0</span></p>
                </div>
                <button id="next-btn" class="neon-btn">NEXT MISSION</button>
                <p style="font-size: 0.8rem; margin-top: 10px; color: rgba(255, 255, 255, 0.5);">[ ENTER to continue ]</p>
            </div>
        </div>

        <!-- The Dedicated Control Deck (Bottom Layer) -->
        <div id="mobile-controls">
            <div id="left-ctrl" class="touch-zone">⟲</div>
            <div id="thrust-ctrl" class="touch-zone">THRUST</div>
            <div id="right-ctrl" class="touch-zone">⟳</div>
        </div>
    </div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
