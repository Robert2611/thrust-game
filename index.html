<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thrust: Neon Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item" id="fuel-container">
                <label>FUEL</label>
                <div class="bar-bg"><div id="fuel-bar"></div></div>
            </div>
            <div class="hud-item" id="difficulty-display">
                <span id="difficulty-text">EASY</span>
            </div>
            <div class="hud-item" id="score-display">
                00000
            </div>
            <div class="hud-item" id="cargo-status">
                CARGO: <span id="cargo-text">[ EMPTY ]</span>
            </div>
        </div>

        <!-- Overlays -->
        <div id="start-screen" class="overlay">
            <h1>THRUST: NEON</h1>
            <p>Navigate the cave. Retrieve the pod.</p>
            <div class="difficulty-picker">
                <button id="btn-easy" onclick="setDifficulty('easy')">SMOOTH</button>
                <button id="btn-normal" onclick="setDifficulty('normal')">NORMAL</button>
                <button id="btn-hard" onclick="setDifficulty('hard')">THRUST MASTER</button>
            </div>
            <button id="start-btn">START MISSION</button>
            <p style="font-size: 0.8rem; margin-top: 10px; color: rgba(255, 255, 255, 0.5);">[ ENTER to launch ]</p>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <div id="left-ctrl" class="touch-zone">⟲</div>
            <div id="right-ctrl" class="touch-zone">⟳</div>
            <div id="thrust-ctrl" class="touch-zone" style="grid-area: thrust;">THRUST</div>
        </div>
    </div>
    
    <script src="levels.js"></script>
    <script src="physics.js"></script>
    <script src="game.js"></script>
</body>
</html>
